sources:
  - name: raw
    database: data
    schema: raw
    tables:
      - name: member_votes
        description: Raw voting data from ft.dk OData API
        columns:
          - name: id
            description: Unique vote identifier
            tests:
              - unique
              - not_null
          - name: typeid
            description: Vote type identifier (For/Against/Abstain/Not present)
            tests:
              - not_null
          - name: afstemningid
            description: Identifier for the vote session
            tests:
              - not_null
          - name: akt_rid
            description: Actor identifier (foreign key to actors.id)
            tests:
              - not_null
          - name: opdateringsdato
            description: Last update timestamp
            tests:
              - not_null
      - name: member_vote_types
        description: Types of votes (for/against/neither/absent)
        columns:
          - name: id
            tests: 
              - unique
              - not_null
          - name: type
          - name: opdateringsdato
      - name: votes
        description: Raw data about polls (afstemninger) from ft.dk OData API
        columns:
          - name: id
            description: Unique poll identifier
            tests:
              - unique
              - not_null
          - name: nummer
            description: Poll number
            tests:
              - not_null
          - name: konklusion
            description: Poll conclusion (e.g., "Vedtaget", "Forkastet")
            tests: 
              - not_null
          - name: m_deid
            description: meeting identifier - foreign key; as of current commit meeting tables are not loaded
          - name: typeid
            description: Poll type identifier (foreign key to Afstemningstype.id)
            tests:
              - not_null
          - name: opdateringsdato
            description: Last update timestamp
            tests:
              - not_null
          - name: sagstrinid
            description: Case step identifier (foreign key to case_step.id)
            tests:
              - not_null
          - name: kommentar
            description: Comment or notes about the poll
      - name: vote_types
        description: Raw poll type (afstemningstype) data from ft.dk OData API
        columns:
          - name: id
            description: Unique vote type identifier
            tests:
              - unique
              - not_null
          - name: opdateringsdato
            description: Last update timestamp
            tests:
              - not_null
          - name: type
            description: Vote type name (Danish) (e.g., "For", "Imod", "Hverken eller", "Fraværende")
            tests:
              - not_null